[package]
name = "daemonize"
version = "0.1.0"
edition = "2021"
description = "Daemonize a process using the double-fork method"
license = "MIT OR Apache-2.0"
keywords = ["daemon", "daemonize", "fork", "unix", "linux"]
categories = ["os::unix-apis"]

[[bin]]
name = "daemonize"
path = "src/main.rs"

[dependencies]
nix = { version = "0.31", features = ["fs", "signal", "process", "user", "resource"] }
clap = { version = "4", features = ["derive"] }
thiserror = "2"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
serial_test = "3"
relentless = "0.7"
