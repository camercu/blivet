[profile.default]
# Fast feedback: no test is allowed to run longer than 5s — kill it, don't
# wait. Also what cargo-mutants relies on (see .cargo/mutants.toml): a mutant
# that hangs a test (blocked pipe reader, stuck loop) dies here at 5s, well
# inside cargo-mutants' auto timeout, and reports as a cleanly caught failure
# instead of TIMEOUT noise.
slow-timeout = { period = "5s", terminate-after = 1 }
