# cargo-mutants configuration.
#
# Tests run under nextest with a per-test kill timeout (see
# .config/nextest.toml): a mutant that hangs the suite (blocked pipe reader,
# loop that stops advancing) is killed by nextest at 30s — inside the 60s
# mutants floor below — and reports as a cleanly caught failure instead of
# TIMEOUT noise.
test_tool = "nextest"
minimum_test_timeout = 60

# Unkillable false positives, excluded with reasons:
#
# Equivalent mutants: `|` over disjoint bitflag constants is value-identical
# to `^` (no shared bits), so no test can ever kill these. Scoped to the
# exact functions that OR constant flags; `|`→`&` is not excluded because it
# does change the value.
#
# cfg-dead stubs: the `#[deprecated]` unsupported-target stubs are never
# compiled on any OS the suite runs on. The drop_privileges entry is
# line-pinned to spare its live twin of the same name; re-pin if context.rs
# shifts. The daemonize stub needs no pin: the real daemonize's twin of that
# mutant is unviable (DaemonContext has no Default).
exclude_re = [
    # -- equivalent bitflag mutants --
    'replace \| with \^ in open_and_lock',
    'replace \| with \^ in plan_output_redirect',
    'replace \| with \^ in thread_count',
    # -- cfg-dead unsupported-target stubs --
    'replace daemonize -> Result<DaemonContext, DaemonizeError> with Ok\(Default::default\(\)\)',
    'src/context\.rs:36\d:9: replace DaemonContext::drop_privileges -> Result<\(\), DaemonizeError> with Ok\(\(\)\)',
    # The cfg(not(linux, macos)) list_open_fds stub is dead on every sweep
    # host; line-pinned to spare the live implementation just above it.
    'src/steps\.rs:36\d:5: replace list_open_fds',
]
