name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_LOCKED: --locked
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Fast tier ──────────────────────────────────────────────

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-deny
      - name: CI
        run: just ci

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - name: Test on MSRV
        run: just test

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - name: Docker test
        run: just docker-test

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Validate PR commits
        run: >-
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  # ── Slow tier (VM-based smoke tests) ──────────────────────

  bsd-smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: freebsd
            version: '14.2'
          - name: openbsd
            version: '7.8'
    runs-on: ubuntu-latest
    name: smoke (${{ matrix.os.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          shell: sh
          run: |
            set -eu

            # Install Rust: OpenBSD uses system packages (Tier 3, no rustup binaries);
            # FreeBSD has rustup support.
            case "$(uname)" in
              OpenBSD)
                sudo pkg_add rust
                ;;
              *)
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
                . "$HOME/.cargo/env"
                ;;
            esac

            cargo build --locked
            PIDFILE="/tmp/daemonize-smoke-$$.pid"
            ./target/debug/daemonize -p "$PIDFILE" -- sleep 30
            i=0
            while [ "$i" -lt 10 ]; do
              [ -f "$PIDFILE" ] && break
              sleep 1
              i=$((i + 1))
            done
            test -f "$PIDFILE" || { echo "FAIL: pidfile not created"; exit 1; }
            PID=$(cat "$PIDFILE")
            kill -0 "$PID" || { echo "FAIL: daemon not running"; exit 1; }
            kill "$PID"
            echo "PASS: smoke test on ${{ matrix.os.name }}"

  # NetBSD 10.1 ships Rust 1.82, below our MSRV (1.85). Cross-compile on the
  # Ubuntu host and run the binary inside the VM.
  netbsd-smoke:
    runs-on: ubuntu-latest
    name: smoke (netbsd)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-netbsd
      - name: Download NetBSD sysroot
        run: |
          mkdir -p /tmp/netbsd-sysroot
          for set in base comp; do
            curl -fL --retry 3 --retry-delay 5 "https://cdn.netbsd.org/pub/NetBSD/NetBSD-10.1/amd64/binary/sets/${set}.tar.xz" \
              | sudo tar xJf - -C /tmp/netbsd-sysroot
          done
      - name: Cross-compile for NetBSD
        env:
          CARGO_TARGET_X86_64_UNKNOWN_NETBSD_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_NETBSD_RUSTFLAGS: >-
            -C link-arg=--target=x86_64-unknown-netbsd
            -C link-arg=--sysroot=/tmp/netbsd-sysroot
            -C link-arg=-fuse-ld=lld
        run: cargo build --locked --target x86_64-unknown-netbsd
      - name: Run smoke test in NetBSD VM
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: netbsd
          version: '10.1'
          shell: sh
          run: |
            set -eu
            PIDFILE="/tmp/daemonize-smoke-$$.pid"
            ./target/x86_64-unknown-netbsd/debug/daemonize -p "$PIDFILE" -- sleep 30
            i=0
            while [ "$i" -lt 10 ]; do
              [ -f "$PIDFILE" ] && break
              sleep 1
              i=$((i + 1))
            done
            test -f "$PIDFILE" || { echo "FAIL: pidfile not created"; exit 1; }
            PID=$(cat "$PIDFILE")
            kill -0 "$PID" || { echo "FAIL: daemon not running"; exit 1; }
            kill "$PID"
            echo "PASS: smoke test on netbsd"

  # OmniOS smoke test disabled: cross-platform-actions/action returns 404
  # downloading OmniOS resources. Re-enable when upstream fixes the issue.
  # https://github.com/cross-platform-actions/action

  # ── Gate (single required status check) ───────────────────

  gate:
    if: always()
    needs: [ci, msrv, docker-test, commitlint, bsd-smoke, netbsd-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.ci.result }}"
            "${{ needs.msrv.result }}"
            "${{ needs.docker-test.result }}"
            "${{ needs.commitlint.result }}"
            "${{ needs.bsd-smoke.result }}"
            "${{ needs.netbsd-smoke.result }}"
          )
          for r in "${results[@]}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "FAIL: job result=$r"; exit 1 ;;
            esac
          done
          echo "All jobs passed."
